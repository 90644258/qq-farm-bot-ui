# .github/workflows/docker-release.yml
name: 构建ARM64 Docker镜像并上传Release

# 触发条件：创建GitHub Release时（包括预发布）
on:
  release:
    types: [created, prereleased]

# 权限配置：需要上传Release附件、读写仓库内容
permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出仓库代码（需构建的Dockerfile所在目录）
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：设置QEMU（支持ARM64架构构建）
      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3

      # 步骤3：设置Docker Buildx（多架构构建工具）
      - name: 设置Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤4：构建ARM64 Docker镜像并导出为tar文件
      - name: 构建并导出镜像
        run: |
          # 定义镜像名称（建议和Release版本关联）
          IMAGE_NAME="your-app-name"
          # 获取Release版本号（从GitHub环境变量中提取）
          VERSION=${{ github.ref_name }}
          # 构建linux/arm64/v8架构的镜像，并导出为tar文件
          docker buildx build \
            --platform linux/arm64/v8 \
            -t ${IMAGE_NAME}:${VERSION}-arm64 \
            -o type=docker,dest=${IMAGE_NAME}-${VERSION}-arm64.tar \
            .  # 此处为Dockerfile所在目录，若不在根目录需修改（如./docker）

      # 步骤5：将tar文件上传到Release附件
      - name: 上传到Release
        uses: softprops/action-gh-release@v2
        with:
          # 要上传的文件路径（和步骤4的导出文件名一致）
          files: |
            ./${{ env.IMAGE_NAME }}-${{ github.ref_name }}-arm64.tar
        env:
          # 使用GitHub内置TOKEN授权
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
